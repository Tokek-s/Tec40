version: '3.8'

services:
  # Base de datos MySQL
  tec40-db:
    image: mysql:8.0
    container_name: tec40-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: tec40_root_2024
      MYSQL_DATABASE: bd_tec_40
      MYSQL_USER: tec40_user
      MYSQL_PASSWORD: tec40_pass_2024
    ports:
      - "3307:3306"
    volumes:
      - tec40-db-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - tec40-network

  # Aplicación Laravel/PHP
  tec40-app:
    image: php:8.2-apache
    container_name: tec40-app
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - tec40-db
    networks:
      - tec40-network
    command: >
      bash -c "apt-get update && 
               apt-get install -y libpng-dev libjpeg-dev libfreetype6-dev zip unzip git libzip-dev libonig-dev && 
               docker-php-ext-configure gd --with-freetype --with-jpeg && 
               docker-php-ext-install pdo pdo_mysql gd zip mbstring && 
               a2enmod rewrite && 
               chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache && 
               chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache && 
               apache2-foreground"

networks:
  tec40-network:
    driver: bridge

volumes:
  tec40-db-data:
    driver: local
